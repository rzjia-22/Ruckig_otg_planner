controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    # 定义两个控制器
    panda_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

panda_arm_controller:
  ros__parameters:
    joints:
      - panda_joint1
      - panda_joint2
      - panda_joint3
      - panda_joint4
      - panda_joint5
      - panda_joint6
      - panda_joint7
    
    command_interfaces:
      - position
    
    state_interfaces:
      - position
      - velocity

    # 允许稍微一点点的误差 (为了仿真稳定)
    constraints:
      goal_time: 0.0
      stopped_velocity_tolerance: 0.05